<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gynosakhi</title>
</head>
<body>
   <aside>
    <div>
        Gynosakhi
    </div>
    <nav>
        <!--siderbar link -->
        <button>Dashboard</button>
         <button>Appointment</button>
          <button>patients</button>
           <button>Earnings & payouts</button>
            <button>Performance Reports</button>
    </nav>
    <div>
         <button>Settings</button>
          <button>Log Out</button>
    </div>
   </aside>
   <!-- main content-->
    <header>
        <div>
        <h1> Dashboard</h1>
        <!--search bar-->
        <div>
        <input type="text" placeholder="search patient or report...">
        </div>
        <span>Dr. P. Sharma</span>
        </div>
</header>
    </header>
    <!--main content view-->
    <main>
        <!--dashboard-->
        <section>
            <h2>Overview & daily Metrics</h2>
            <!--key performance-->
            <div>
                <span>Today's Appointment</span>
                <p>12</p>
            </div>
            <div>
                <span>Wallet Balance</span>
                <p>45,800</p>
            </div>
            <div>
                <span>Awerage Rating</span>
                <p>4.9</p>
            </div>
            <div>
                <span>AVG. Consult Time</span>
                <p>15.4 min</p>
            </div>
        </section>
        <!-- chart -->
         <div class="glass-card p-6 rounded-2xl lg:col-span-2">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-xl font-semibold text-text-dark dark:text-text-light">Monthly Revenue Trend</h3>
                                <div class="flex items-center space-x-2">
                                    <span class="text-sm font-medium text-gray-500">Total:</span>
                                    <span class="text-xl font-bold text-primary">₹1,85,000</span>
                                </div>
                            </div>
                            <div class="h-80 flex items-end p-4 bg-gray-50 dark:bg-slate-800 rounded-xl">
                                <!-- Chart Placeholder -->
                                <svg class="w-full h-full" viewBox="0 0 100 100" preserveAspectRatio="none">
                                    <!-- Grid Lines -->
                                    <line x1="0" y1="20" x2="100" y2="20" stroke="#E2E8F0" stroke-width="0.3" class="dark:stroke-slate-700"></line>
                                    <line x1="0" y1="50" x2="100" y2="50" stroke="#E2E8F0" stroke-width="0.3" class="dark:stroke-slate-700"></line>
                                    <line x1="0" y1="80" x2="100" y2="80" stroke="#E2E8F0" stroke-width="0.3" class="dark:stroke-slate-700"></line>
                                    <!-- Primary Teal Line -->
                                    <polyline fill="rgba(2, 185, 160, 0.1)" stroke="#02B9A0" stroke-width="1.5" points="0,95 20,40 40,70 60,30 80,60 100,20"></polyline>
                                    <!-- Points -->
                                    <circle cx="0" cy="95" r="1.5" fill="#02B9A0"></circle>
                                    <circle cx="20" cy="40" r="1.5" fill="#02B9A0"></circle>
                                    <circle cx="40" cy="70" r="1.5" fill="#02B9A0"></circle>
                                    <circle cx="60" cy="30" r="1.5" fill="#02B9A0"></circle>
                                    <circle cx="80" cy="60" r="1.5" fill="#02B9A0"></circle>
                                    <circle cx="100" cy="20" r="1.5" fill="#02B9A0"></circle>
                                </svg>
                            </div>
                            <div class="flex justify-between text-xs text-gray-500 dark:text-gray-400 mt-2 px-2">
                                <span>Jul</span><span>Aug</span><span>Sep</span><span>Oct</span><span>Nov</span><span>Dec</span>
                            </div>
                        </div>
    </main>
</body>
</html>
